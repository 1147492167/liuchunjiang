<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星辰之谕 · 星座运势</title>
<style>
  :root {
    --bg-deep: #0d0c0a;
    --bg-card: rgba(255,255,255,0.025);
    --border-subtle: rgba(255,255,255,0.06);
    --border-active: rgba(201,168,108,0.35);
    --gold: #c9a86c;
    --gold-light: #d4b87a;
    --gold-dim: rgba(201,168,108,0.15);
    --copper: #c17e5a;
    --rose: #b8867e;
    --text: #ede8dd;
    --text-dim: #8a8278;
    --text-muted: #544f48;
    --radius: 18px;
    --radius-sm: 12px;
    --transition: 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    background: var(--bg-deep);
    color: var(--text);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== Cosmic Background ===== */
  .cosmos { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

  .nebula {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.25;
    animation: nebulaDrift 20s ease-in-out infinite;
  }
  .nebula.n1 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(180,130,60,0.4), transparent); top: -15%; left: -10%; animation-delay: 0s; }
  .nebula.n2 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(200,150,80,0.3), transparent); bottom: -10%; right: -8%; animation-delay: -7s; }
  .nebula.n3 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(160,90,50,0.3), transparent); top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -14s; }

  @keyframes nebulaDrift {
    0%, 100% { transform: translate(0, 0) scale(1); }
    25% { transform: translate(30px, -20px) scale(1.08); }
    50% { transform: translate(-15px, 25px) scale(0.94); }
    75% { transform: translate(-25px, -15px) scale(1.04); }
  }

  .star-field { position: absolute; inset: 0; }
  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--tw-dur) ease-in-out infinite;
    animation-delay: var(--tw-delay);
    opacity: 0;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.15; transform: scale(1); }
    30% { opacity: 0.9; transform: scale(1.6); }
    60% { opacity: 0.3; transform: scale(0.85); }
  }

  /* constellation lines */
  .const-line {
    position: absolute;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
    transform-origin: left center;
    animation: lineShimmer 8s ease-in-out infinite;
    animation-delay: var(--cl-delay);
  }
  @keyframes lineShimmer {
    0%, 100% { opacity: 0.12; }
    50% { opacity: 0.35; }
  }

  /* ===== Container ===== */
  .container {
    position: relative;
    z-index: 1;
    max-width: 920px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }

  /* ===== Header ===== */
  header {
    text-align: center;
    padding: 48px 20px 16px;
  }
  header h1 {
    font-size: 2.6rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    background: linear-gradient(135deg, #e8d5a3 0%, #c9a86c 30%, #d4b87a 60%, #b8935e 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }
  header .subtitle {
    font-size: 0.82rem;
    letter-spacing: 0.25em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  /* ===== Mode Tabs ===== */
  .mode-tabs {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin: 24px auto 10px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border-subtle);
    border-radius: 30px;
    padding: 4px;
    width: fit-content;
  }
  .mode-tab {
    padding: 9px 26px;
    font-size: 0.9rem;
    cursor: pointer;
    color: var(--text-dim);
    transition: var(--transition);
    user-select: none;
    font-weight: 500;
    border-radius: 26px;
    letter-spacing: 0.03em;
  }
  .mode-tab.active {
    background: rgba(201,168,108,0.12);
    color: var(--gold-light);
    box-shadow: 0 0 20px rgba(201,168,108,0.08);
  }
  .mode-tab:hover:not(.active) { color: var(--text); }

  .date-display {
    text-align: center;
    margin-bottom: 8px;
    color: var(--text-dim);
    font-size: 0.85rem;
    letter-spacing: 0.04em;
  }

  /* ===== Section Titles ===== */
  .section-title {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-align: center;
    margin: 28px 0 14px;
    display: flex;
    align-items: center;
    gap: 14px;
    justify-content: center;
  }
  .section-title::before, .section-title::after {
    content: '';
    height: 1px;
    width: 40px;
    background: linear-gradient(90deg, transparent, var(--border-subtle), transparent);
  }

  /* ===== Daily Overview Strip (NEW) ===== */
  .overview-strip {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding: 8px 4px 14px;
    scroll-behavior: smooth;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .overview-strip::-webkit-scrollbar { display: none; }

  .overview-item {
    flex: 0 0 auto;
    width: 68px;
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    padding: 10px 6px 8px;
    text-align: center;
    cursor: pointer;
    transition: var(--transition);
    backdrop-filter: blur(12px);
  }
  .overview-item:hover {
    border-color: rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    transform: translateY(-2px);
  }
  .overview-item.selected {
    border-color: var(--border-active);
    background: rgba(201,168,108,0.08);
    box-shadow: 0 0 16px rgba(201,168,108,0.1);
  }
  .overview-item .ov-icon { font-size: 1.4rem; margin-bottom: 2px; }
  .overview-item .ov-name { font-size: 0.68rem; color: var(--text-dim); margin-bottom: 4px; }
  .overview-item .ov-dots { display: flex; gap: 1.5px; justify-content: center; }
  .ov-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    transition: var(--transition);
  }
  .ov-dot.lit { background: var(--gold); box-shadow: 0 0 4px var(--gold); }

  /* ===== Sign Grid ===== */
  .sign-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 32px;
  }
  @media (max-width: 640px) { .sign-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; } }
  @media (max-width: 400px) { .sign-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; } }

  .sign-card {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius);
    padding: 20px 12px 16px;
    text-align: center;
    cursor: pointer;
    transition: var(--transition);
    backdrop-filter: blur(14px);
    user-select: none;
    position: relative;
    overflow: hidden;
  }
  .sign-card::after {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    background: radial-gradient(circle at 50% 0%, rgba(201,168,108,0.08), transparent 70%);
    transition: opacity 0.4s ease;
    pointer-events: none;
  }
  .sign-card:hover::after { opacity: 1; }
  .sign-card:hover {
    border-color: rgba(255,255,255,0.15);
    transform: translateY(-4px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.3);
  }
  .sign-card.selected {
    border-color: var(--border-active);
    background: rgba(201,168,108,0.07);
    box-shadow: 0 0 28px rgba(201,168,108,0.12), inset 0 0 20px rgba(201,168,108,0.03);
  }
  .sign-card .card-glow {
    position: absolute;
    top: -20px; left: 50%; transform: translateX(-50%);
    width: 60px; height: 30px;
    background: radial-gradient(ellipse, rgba(201,168,108,0.15), transparent);
    opacity: 0;
    transition: opacity 0.4s;
    pointer-events: none;
  }
  .sign-card.selected .card-glow { opacity: 1; }

  .sign-icon { font-size: 2.2rem; margin-bottom: 6px; position: relative; z-index: 1; }
  .sign-name { font-size: 0.95rem; font-weight: 600; color: var(--text); position: relative; z-index: 1; }
  .sign-date { font-size: 0.7rem; color: var(--text-muted); margin-top: 3px; position: relative; z-index: 1; }
  .sign-element {
    display: inline-block;
    font-size: 0.65rem;
    padding: 2px 8px;
    border-radius: 10px;
    margin-top: 6px;
    letter-spacing: 0.05em;
    position: relative; z-index: 1;
  }
  .el-fire  { background: rgba(239,68,68,0.12); color: #f87171; }
  .el-earth { background: rgba(245,158,11,0.12); color: #fbbf24; }
  .el-air   { background: rgba(56,189,248,0.12); color: #7dd3fc; }
  .el-water { background: rgba(20,184,166,0.12); color: #2dd4bf; }

  /* ===== Detail Panel ===== */
  .detail-panel {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius);
    padding: 28px;
    backdrop-filter: blur(18px);
    animation: panelIn 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    margin-bottom: 32px;
  }
  @keyframes panelIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .detail-top {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 24px;
    padding-bottom: 22px;
    border-bottom: 1px solid var(--border-subtle);
  }
  .detail-icon-lg { font-size: 3rem; }
  .detail-info h2 { font-size: 1.5rem; font-weight: 700; color: var(--text); }
  .detail-info .meta { color: var(--text-dim); font-size: 0.82rem; margin-top: 2px; }

  .score-ring-wrap { margin-left: auto; text-align: center; }
  .score-ring {
    width: 78px; height: 78px;
    border-radius: 50%;
    background: conic-gradient(var(--gold) calc(var(--pct) * 1%), rgba(255,255,255,0.04) 0);
    display: flex; align-items: center; justify-content: center;
    position: relative;
    animation: ringFill 0.8s ease-out;
  }
  @keyframes ringFill {
    from { background: conic-gradient(rgba(255,255,255,0.04) 0deg, rgba(255,255,255,0.04) 360deg); }
  }
  .score-ring::after {
    content: '';
    position: absolute;
    width: 60px; height: 60px;
    border-radius: 50%;
    background: #0d0c0a;
  }
  .score-ring .score-num {
    position: relative; z-index: 1;
    font-size: 1.5rem; font-weight: 700; color: var(--gold-light);
  }
  .score-ring-wrap .score-label { font-size: 0.7rem; color: var(--text-dim); margin-top: 4px; }

  /* Category bars */
  .cat-list { display: flex; flex-direction: column; gap: 14px; margin-bottom: 22px; }
  .cat-row {
    display: grid;
    grid-template-columns: 100px 1fr 60px;
    align-items: center;
    gap: 14px;
  }
  @media (max-width: 500px) { .cat-row { grid-template-columns: 70px 1fr 40px; gap: 8px; } }
  .cat-label { display: flex; align-items: center; gap: 6px; font-size: 0.88rem; color: var(--text); }
  .cat-label .cat-emoji { font-size: 1.1rem; }
  .cat-bar-wrap {
    height: 6px;
    background: rgba(255,255,255,0.05);
    border-radius: 3px;
    overflow: hidden;
  }
  .cat-bar-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--gold-dim), var(--gold-light));
    transition: width 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    animation: barGrow 0.7s ease-out;
  }
  @keyframes barGrow { from { width: 0 !important; } }
  .cat-score-text { font-size: 0.85rem; font-weight: 600; color: var(--gold-light); text-align: right; }
  .cat-desc { font-size: 0.78rem; color: var(--text-dim); margin-top: 3px; grid-column: 2 / 4; padding-left: 0; }

  /* Lucky grid */
  .lucky-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  @media (max-width: 500px) { .lucky-grid { grid-template-columns: repeat(2, 1fr); } }
  .lucky-item {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    padding: 14px;
    text-align: center;
  }
  .lucky-item .lucky-icon { font-size: 1.3rem; margin-bottom: 4px; }
  .lucky-item .lucky-label { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.08em; }
  .lucky-item .lucky-value { font-size: 1rem; font-weight: 600; color: var(--text); }

  .advice-card {
    background: rgba(201,168,108,0.04);
    border-left: 3px solid var(--gold-dim);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 16px 20px;
    font-size: 0.88rem;
    line-height: 1.7;
    color: #d8d0c4;
  }
  .advice-card strong { color: var(--gold-light); }

  /* ===== Pair Mode ===== */
  .pair-selector {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .pair-box {
    background: var(--bg-card);
    border: 2px dashed rgba(255,255,255,0.1);
    border-radius: var(--radius);
    padding: 28px 22px;
    text-align: center;
    cursor: pointer;
    transition: var(--transition);
    min-width: 150px;
    backdrop-filter: blur(14px);
  }
  .pair-box:hover { border-color: rgba(201,168,108,0.4); background: rgba(255,255,255,0.05); }
  .pair-box.filled { border-style: solid; border-color: rgba(201,168,108,0.3); background: rgba(201,168,108,0.05); }
  .pair-box .pb-icon { font-size: 2.6rem; }
  .pair-box .pb-name { font-size: 1rem; font-weight: 600; color: var(--text); margin-top: 6px; }
  .pair-box .pb-hint { font-size: 0.72rem; color: var(--text-muted); margin-top: 4px; }
  .pair-vs {
    font-size: 1.2rem; font-weight: 700; color: var(--gold-dim);
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border-subtle); border-radius: 50%;
  }

  .pair-btn {
    display: block;
    margin: 0 auto 24px;
    padding: 12px 44px;
    border: none; border-radius: 28px;
    background: linear-gradient(135deg, #b8935e, #c9a86c, #d4b87a);
    color: #0a0f1f;
    font-size: 0.95rem; font-weight: 700;
    cursor: pointer; transition: var(--transition);
    font-family: inherit; letter-spacing: 0.04em;
  }
  .pair-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(201,168,108,0.3);
  }
  .pair-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .pair-result {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius);
    padding: 28px;
    backdrop-filter: blur(18px);
    animation: panelIn 0.45s ease;
    margin-bottom: 32px;
  }
  .pair-head {
    display: flex; align-items: center; justify-content: center; gap: 20px;
    margin-bottom: 22px; padding-bottom: 20px;
    border-bottom: 1px solid var(--border-subtle);
  }
  .pair-head-sign { text-align: center; }
  .pair-head-sign .phs-icon { font-size: 2.6rem; }
  .pair-head-sign .phs-name { font-size: 1rem; font-weight: 600; color: var(--text); margin-top: 4px; }
  .pair-head-heart {
    font-size: 1.6rem;
    animation: heartbeat 1.2s ease-in-out infinite;
  }
  @keyframes heartbeat {
    0%,100%{transform:scale(1)} 15%{transform:scale(1.25)} 30%{transform:scale(1)} 45%{transform:scale(1.15)} 60%{transform:scale(1)}
  }

  /* ===== Element Guide (NEW) ===== */
  .element-guide {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 32px;
  }
  @media (max-width: 640px) { .element-guide { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 400px) { .element-guide { grid-template-columns: 1fr; } }

  .element-card {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius);
    padding: 20px 16px;
    text-align: center;
    backdrop-filter: blur(14px);
    transition: var(--transition);
  }
  .element-card:hover { border-color: rgba(255,255,255,0.12); transform: translateY(-3px); }
  .element-card .el-icon { font-size: 2rem; margin-bottom: 8px; }
  .element-card .el-name { font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .element-card .el-trait { font-size: 0.72rem; color: var(--text-dim); margin-bottom: 10px; line-height: 1.5; }
  .element-card .el-signs { font-size: 0.72rem; color: var(--text-muted); }

  /* ===== Footer ===== */
  footer {
    text-align: center;
    padding: 32px 20px;
    color: var(--text-muted);
    font-size: 0.72rem;
    letter-spacing: 0.06em;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="cosmos">
  <div class="nebula n1"></div>
  <div class="nebula n2"></div>
  <div class="nebula n3"></div>
  <div class="star-field" id="starField"></div>
</div>

<div class="container">
  <header>
    <h1>星辰之谕</h1>
    <p class="subtitle">Daily Horoscope &amp; Compatibility</p>
  </header>

  <div class="mode-tabs">
    <div class="mode-tab active" data-mode="fortune" onclick="switchMode('fortune')">每日运势</div>
    <div class="mode-tab" data-mode="pair" onclick="switchMode('pair')">星座配对</div>
  </div>

  <div class="date-display" id="dateDisplay"></div>

  <!-- 运势模式 -->
  <div id="fortuneMode">
    <div class="section-title">今日星象总览</div>
    <div class="overview-strip" id="overviewStrip"></div>
    <div class="section-title">选择星座查看详情</div>
    <div class="sign-grid" id="signGrid"></div>
  </div>

  <!-- 配对模式 -->
  <div id="pairMode" class="hidden">
    <div class="pair-selector">
      <div class="pair-box" id="pairBoxA" onclick="openSignPicker('A')">
        <div class="pb-icon">❓</div>
        <div class="pb-name">选择星座</div>
        <div class="pb-hint">点击选择</div>
      </div>
      <div class="pair-vs">VS</div>
      <div class="pair-box" id="pairBoxB" onclick="openSignPicker('B')">
        <div class="pb-icon">❓</div>
        <div class="pb-name">选择星座</div>
        <div class="pb-hint">点击选择</div>
      </div>
    </div>
    <button class="pair-btn" id="pairBtn" disabled onclick="doPair()">查看配对结果</button>
    <div class="sign-grid hidden" id="signPicker"></div>
  </div>

  <!-- 详情面板 -->
  <div id="detailPanel"></div>

  <!-- 星座元素指南 -->
  <div class="section-title">星座元素</div>
  <div class="element-guide" id="elementGuide"></div>

  <footer>星辰为引 · 仅供娱乐 · 愿你每一天都闪闪发光</footer>
</div>

<script>
/* ===== Data ===== */
const SIGNS = [
  { name: '白羊座', icon: '♈', emoji: '🐏', dateRange: '3.21 - 4.19', element: '火', elementCls: 'el-fire', color: '#f87171' },
  { name: '金牛座', icon: '♉', emoji: '🐂', dateRange: '4.20 - 5.20', element: '土', elementCls: 'el-earth', color: '#fbbf24' },
  { name: '双子座', icon: '♊', emoji: '👯', dateRange: '5.21 - 6.21', element: '风', elementCls: 'el-air', color: '#7dd3fc' },
  { name: '巨蟹座', icon: '♋', emoji: '🦀', dateRange: '6.22 - 7.22', element: '水', elementCls: 'el-water', color: '#2dd4bf' },
  { name: '狮子座', icon: '♌', emoji: '🦁', dateRange: '7.23 - 8.22', element: '火', elementCls: 'el-fire', color: '#f87171' },
  { name: '处女座', icon: '♍', emoji: '🌾', dateRange: '8.23 - 9.22', element: '土', elementCls: 'el-earth', color: '#fbbf24' },
  { name: '天秤座', icon: '♎', emoji: '⚖️', dateRange: '9.23 - 10.23', element: '风', elementCls: 'el-air', color: '#7dd3fc' },

/* ===== Utilities ===== */
function seedRandom(seed) {
  let h = 0;
  for (let i = 0; i < seed.length; i++) { h = ((h << 5) - h) + seed.charCodeAt(i); h |= 0; }
  return function() { h = (h * 1103515245 + 12345) | 0; return (h >>> 0) / 0xFFFFFFFF; };
}

function getDaySeed() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
}

function pick(arr, rng) { return arr[Math.floor(rng() * arr.length)]; }

function getStars(score) {
  const full = Math.round(score / 20);
  return '★'.repeat(full) + '☆'.repeat(5 - full);
}

function scoreToDots(score) {
  const dots = Math.round(score / 20);
  return Array.from({ length: 5 }, (_, i) => i < dots);
}

/* ===== Fortune Generation ===== */
function generateFortune(sign) {
  const seed = getDaySeed() + sign.name;
  const rng = seedRandom(seed);
  const categories = ASPECTS.map(aspect => {
    const score = 55 + Math.floor(rng() * 45);
    return { ...aspect, score, stars: getStars(score), desc: pick(aspect.descs, rng) };
  });
  const overall = Math.round(categories.reduce((s, c) => s + c.score, 0) / categories.length);
  return {
    overall, categories,
    luckyColor: pick(LUCKY_COLORS, rng),
    luckyNumber: Math.floor(rng() * 60) + 1,
    luckyDirection: pick(LUCKY_DIRECTIONS, rng),
    luckyTimes: LUCKY_TIMES[sign.element],
    luckyTimeNote: TIME_LABELS[sign.element],
    advice: pick(ADVICE_TEMPLATES, rng),
    sign,
  };
}

/* ===== Pair Mode ===== */
let pairSlotA = null, pairSlotB = null, pickingFor = null;

function getPairScore(a, b) {
  const rng = seedRandom(getDaySeed() + a.name + b.name);
  const compatList = COMPAT_MAP[a.name];
  const isCompat = compatList && compatList.includes(b.name);
  const sameElement = a.element === b.element;
  const elementCompat = {
    '火风': true, '风火': true, '水土': true, '土水': true,
    '火土': false, '土火': false, '风水': false, '水风': false,
  };
  const elemKey = a.element + b.element;
  const elemOk = a.element === b.element ? true : (elementCompat[elemKey] ?? null);
  let base;
  if (isCompat && sameElement) base = 78;
  else if (isCompat) base = 72;
  else if (sameElement) base = 65;
  else if (elemOk === true) base = 60;
  else if (elemOk === null) base = 50;
  else base = 40;
  return {
    overall: base + Math.floor(rng() * 18),
    love: { score: base + Math.floor(rng() * 20), key: 'love', name: '爱情', icon: '💕' },
    friend: { score: base + Math.floor(rng() * 20) + 5, key: 'friend', name: '友情', icon: '🤝' },
    work: { score: base + Math.floor(rng() * 20) - 2, key: 'work', name: '事业合作', icon: '🤝' },
    rng,
  };
}

function getLevel(score) { return score >= 85 ? 'high' : score >= 65 ? 'mid' : 'low'; }

  if (pickingFor === slot) { document.getElementById('signPicker').classList.add('hidden'); pickingFor = null; return; }

  picker.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

  if (!pairSlotA || !pairSlotB) return;

  const data = getPairScore(a, b);
  const cats = [data.love, data.friend, data.work];
  const overall = Math.round(cats.reduce((s, c) => s + c.score, 0) / cats.length);
  const level = getLevel(overall);

  const panel = document.getElementById('detailPanel');
  panel.innerHTML = `

      <div class="pair-head">
        <div class="pair-head-sign"><div class="phs-icon">${a.icon}</div><div class="phs-name">${a.name}</div></div>
        <div class="pair-head-heart">💗</div>
        <div class="pair-head-sign"><div class="phs-icon">${b.icon}</div><div class="phs-name">${b.name}</div></div>
        <div class="score-ring-wrap" style="margin-left:20px">
          <div class="score-ring" style="--pct:${overall}">
            <span class="score-num">${overall}</span>
          </div>
          <div class="score-label">配对指数</div>
        </div>
      </div>
      <div class="cat-list">
        ${cats.map(c => `
          <div>
            <div class="cat-row">
              <div class="cat-label"><span class="cat-emoji">${c.icon}</span>${c.name}</div>
              <div class="cat-bar-wrap"><div class="cat-bar-fill" style="width:${c.score}%"></div></div>
              <div class="cat-score-text">${c.score}</div>
            </div>
            <div class="cat-desc">${pick(PAIR_CAT_DESCS[c.key][getLevel(c.score)], data.rng)}</div>
          </div>
        `).join('')}
      </div>
      <div class="advice-card" style="background:rgba(201,168,108,0.04);border-left-color:rgba(201,168,108,0.2);">
        💫 ${pick(PAIR_ADVICE[level], data.rng)}
      </div>
    </div>
  `;
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

/* ===== Mode Switch ===== */
let currentMode = 'fortune';

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
  document.getElementById('fortuneMode').classList.toggle('hidden', mode !== 'fortune');
  document.getElementById('pairMode').classList.toggle('hidden', mode !== 'pair');
  document.getElementById('detailPanel').innerHTML = '';
  if (mode === 'pair') {
    document.getElementById('signPicker').classList.add('hidden');
    pickingFor = null; pairSlotA = null; pairSlotB = null;
    resetPairBoxes(); updatePairBtn();
  } else {
    document.querySelectorAll('.sign-card').forEach(c => c.classList.remove('selected'));
    document.querySelectorAll('.overview-item').forEach(c => c.classList.remove('selected'));
  }
}

function resetPairBoxes() {
  ['pairBoxA', 'pairBoxB'].forEach(id => {
    const box = document.getElementById(id);
    box.classList.remove('filled');
    box.innerHTML = `<div class="pb-icon">❓</div><div class="pb-name">选择星座</div><div class="pb-hint">点击选择</div>`;
  });
}

/* ===== Element Guide (NEW) ===== */
function renderElementGuide() {
  document.getElementById('elementGuide').innerHTML = ELEMENT_GUIDE.map(e => `
    <div class="element-card">
      <div class="el-icon">${e.icon}</div>
      <div class="el-name">${e.name}</div>
      <div class="el-trait">${e.trait}</div>
      <div class="el-signs">${e.signs}</div>
    </div>
  `).join('');
}

/* ===== Background ===== */
function createStars() {
  const field = document.getElementById('starField');
  let html = '';
  for (let i = 0; i < 130; i++) {
    const x = Math.random() * 100, y = Math.random() * 100;
    const size = Math.random() * 2.2 + 0.4;
    const dur = Math.random() * 4 + 3;
    const delay = Math.random() * 6;
    html += `<div class="star" style="left:${x}%;top:${y}%;width:${size}px;height:${size}px;--tw-dur:${dur}s;--tw-delay:${delay}s"></div>`;
  }
  // Add a few constellation lines
  const lines = [
    { x1: 15, y1: 20, x2: 22, y2: 14, angle: -35, len: 80 },
    { x1: 78, y1: 12, x2: 85, y2: 8, angle: -20, len: 70 },
    { x1: 20, y1: 72, x2: 28, y2: 65, angle: -25, len: 90 },
    { x1: 70, y1: 75, x2: 77, y2: 80, angle: 25, len: 75 },
    { x1: 45, y1: 85, x2: 52, y2: 78, angle: -30, len: 85 },
  ];
  lines.forEach((l, i) => {
    html += `<div class="const-line" style="left:${l.x1}%;top:${l.y1}%;width:${l.len}px;transform:rotate(${l.angle}deg);--cl-delay:${i * 1.5}s"></div>`;
  });
  field.innerHTML = html;
}

function setDateDisplay() {
  const d = new Date();
  const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
  document.getElementById('dateDisplay').textContent =
    `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日 · 星期${weekDays[d.getDay()]}`;
}

/* ===== Init ===== */
createStars();
setDateDisplay();
renderSignGrid();
renderDailyOverview();
renderElementGuide();
</script>
</body>
</html>
