<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星座运势 - 每日运势 & 星座配对</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #0c0f1d 0%, #1a1040 30%, #0d1b3e 70%, #0c0f1d 100%);
    color: #e0e0e0;
    overflow-x: hidden;
  }

  .stars {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 0;
  }

  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite;
    animation-delay: var(--delay);
    opacity: 0;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.5); }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
  }

  header {
    text-align: center;
    padding: 40px 20px 20px;
  }

  header h1 {
    font-size: 2.4rem;
    font-weight: 700;
    background: linear-gradient(135deg, #c084fc, #e879f9, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  header .subtitle {
    color: #a78bfa;
    font-size: 1rem;
    letter-spacing: 2px;
  }

  /* ---- mode tabs ---- */
  .mode-tabs {
    display: flex;
    justify-content: center;
    gap: 0;
    margin: 10px 0 20px;
    background: rgba(255,255,255,0.04);
    border-radius: 14px;
    overflow: hidden;
    width: fit-content;
    margin-left: auto;
    margin-right: auto;
  }

  .mode-tab {
    padding: 10px 28px;
    font-size: 0.95rem;
    cursor: pointer;
    color: #94a3b8;
    transition: all 0.3s ease;
    user-select: none;
    font-weight: 500;
  }

  .mode-tab.active {
    background: rgba(139,92,246,0.25);
    color: #e2e8f0;
  }

  .mode-tab:hover:not(.active) {
    color: #cbd5e1;
    background: rgba(255,255,255,0.04);
  }

  .date-display {
    text-align: center;
    margin-bottom: 10px;
    color: #94a3b8;
    font-size: 0.9rem;
  }

  /* ---- sign grid ---- */
  .sign-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 40px;
  }

  @media (max-width: 640px) {
    .sign-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
    header h1 { font-size: 1.8rem; }
  }

  @media (max-width: 400px) {
    .sign-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  }

  .sign-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 18px 10px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
    user-select: none;
  }

  .sign-card:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(192,132,252,0.4);
    transform: translateY(-3px);
    box-shadow: 0 8px 32px rgba(139,92,246,0.15);
  }

  .sign-card.selected {
    background: rgba(139,92,246,0.2);
    border-color: rgba(192,132,252,0.6);
    box-shadow: 0 0 24px rgba(139,92,246,0.25);
  }

  .sign-card.pair-selected {
    background: rgba(236,72,153,0.18);
    border-color: rgba(236,72,153,0.5);
    box-shadow: 0 0 24px rgba(236,72,153,0.2);
  }

  .sign-icon {
    font-size: 2.2rem;
    margin-bottom: 6px;
  }

  .sign-name {
    font-size: 0.95rem;
    font-weight: 600;
    color: #e2e8f0;
  }

  .sign-date-range {
    font-size: 0.7rem;
    color: #64748b;
    margin-top: 2px;
  }

  /* ---- pairing selector ---- */
  .pair-selector {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .pair-sign-box {
    background: rgba(255,255,255,0.04);
    border: 2px dashed rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 24px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    min-width: 140px;
  }

  .pair-sign-box:hover {
    border-color: rgba(192,132,252,0.5);
    background: rgba(255,255,255,0.07);
  }

  .pair-sign-box.filled {
    border-style: solid;
    border-color: rgba(192,132,252,0.5);
    background: rgba(139,92,246,0.1);
  }

  .pair-sign-box .pair-sign-icon {
    font-size: 2.4rem;
  }

  .pair-sign-box .pair-sign-name {
    font-size: 1rem;
    font-weight: 600;
    color: #e2e8f0;
    margin-top: 6px;
  }

  .pair-sign-box .pair-sign-hint {
    font-size: 0.75rem;
    color: #64748b;
    margin-top: 4px;
  }

  .pair-vs {
    font-size: 1.4rem;
    font-weight: 700;
    color: #a78bfa;
  }

  .pair-btn {
    display: block;
    margin: 0 auto 30px;
    padding: 12px 40px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #a855f7, #ec4899);
    color: white;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    font-family: inherit;
  }

  .pair-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(168,85,247,0.35);
  }

  .pair-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* ---- detail panel ---- */
  .detail-panel {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 30px;
    backdrop-filter: blur(10px);
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .detail-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .detail-icon {
    font-size: 3rem;
  }

  .detail-info h2 {
    font-size: 1.5rem;
    font-weight: 700;
    color: #f1f5f9;
  }

  .detail-info .date-range {
    color: #94a3b8;
    font-size: 0.85rem;
    margin-top: 2px;
  }

  .overall-score {
    margin-left: auto;
    text-align: center;
  }

  .score-circle {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: conic-gradient(#c084fc calc(var(--score) * 1%), rgba(255,255,255,0.05) 0);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .score-circle.pair-score {
    background: conic-gradient(#f472b6 calc(var(--score) * 1%), rgba(255,255,255,0.05) 0);
  }

  .score-circle::after {
    content: '';
    position: absolute;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #0f1328;
  }

  .score-circle .score-text {
    position: relative;
    z-index: 1;
    font-size: 1.4rem;
    font-weight: 700;
    color: #c084fc;
  }

  .score-circle.pair-score .score-text {
    color: #f472b6;
  }

  .score-label {
    font-size: 0.7rem;
    color: #94a3b8;
    margin-top: 4px;
  }

  /* ---- pair header ---- */
  .pair-header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .pair-header-sign {
    text-align: center;
  }

  .pair-header-sign .ph-icon {
    font-size: 2.6rem;
  }

  .pair-header-sign .ph-name {
    font-size: 1.1rem;
    font-weight: 600;
    color: #e2e8f0;
    margin-top: 4px;
  }

  .pair-header-heart {
    font-size: 1.8rem;
    animation: heartbeat 1.2s ease-in-out infinite;
  }

  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    15% { transform: scale(1.25); }
    30% { transform: scale(1); }
    45% { transform: scale(1.15); }
    60% { transform: scale(1); }
  }

  /* ---- fortune categories ---- */
  .fortune-categories {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 24px;
  }

  @media (max-width: 640px) {
    .fortune-categories { grid-template-columns: repeat(2, 1fr); }
  }

  .fortune-cat {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 16px;
    text-align: center;
  }

  .fortune-cat .cat-icon {
    font-size: 1.5rem;
    margin-bottom: 6px;
  }

  .fortune-cat .cat-name {
    font-size: 0.85rem;
    color: #a78bfa;
    margin-bottom: 4px;
  }

  .fortune-cat .cat-stars {
    color: #fbbf24;
    font-size: 0.9rem;
    letter-spacing: 2px;
  }

  .fortune-cat .cat-desc {
    font-size: 0.78rem;
    color: #94a3b8;
    margin-top: 6px;
    line-height: 1.5;
  }

  /* ---- lucky section ---- */
  .lucky-section {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  @media (max-width: 640px) {
    .lucky-section { grid-template-columns: repeat(2, 1fr); }
  }

  .lucky-item {
    background: rgba(255,255,255,0.03);
    border-radius: 12px;
    padding: 14px;
    text-align: center;
  }

  .lucky-item .lucky-label {
    font-size: 0.75rem;
    color: #64748b;
    margin-bottom: 4px;
  }

  .lucky-item .lucky-value {
    font-size: 1.1rem;
    font-weight: 700;
    color: #e2e8f0;
  }

  .lucky-color-dot {
    display: inline-block;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    vertical-align: middle;
    margin-right: 6px;
    border: 2px solid rgba(255,255,255,0.2);
  }

  .daily-advice {
    background: rgba(139,92,246,0.08);
    border-left: 3px solid #a78bfa;
    border-radius: 0 12px 12px 0;
    padding: 16px 20px;
    font-size: 0.9rem;
    line-height: 1.7;
    color: #cbd5e1;
  }

  .daily-advice strong {
    color: #c084fc;
  }

  .pair-advice {
    background: rgba(236,72,153,0.06);
    border-left: 3px solid #f472b6;
    border-radius: 0 12px 12px 0;
    padding: 16px 20px;
    font-size: 0.9rem;
    line-height: 1.7;
    color: #cbd5e1;
  }

  .pair-advice strong {
    color: #f472b6;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #64748b;
  }

  .empty-state .empty-icon {
    font-size: 4rem;
    margin-bottom: 16px;
  }

  .empty-state p {
    font-size: 1rem;
  }

  footer {
    text-align: center;
    padding: 30px;
    color: #475569;
    font-size: 0.75rem;
  }

  .hidden { display: none !important; }
</style>
</head>

<div class="stars" id="stars"></div>

<div class="container">

    <h1>星座运势</h1>
    <p class="subtitle">DAILY HOROSCOPE & COMPATIBILITY</p>
  </header>

  <div class="mode-tabs">
    <div class="mode-tab active" data-mode="fortune" onclick="switchMode('fortune')">每日运势</div>
    <div class="mode-tab" data-mode="pair" onclick="switchMode('pair')">星座配对</div>
  </div>

  <div class="date-display" id="dateDisplay"></div>

  <!-- 运势模式 -->
  <div id="fortuneMode">
    <div class="sign-grid" id="signGrid"></div>
  </div>

  <!-- 配对模式 -->
  <div id="pairMode" class="hidden">
    <div class="pair-selector">
      <div class="pair-sign-box" id="pairBoxA" onclick="openSignPicker('A')">
        <div class="pair-sign-icon">❓</div>
        <div class="pair-sign-name">选择星座</div>
        <div class="pair-sign-hint">点击选择</div>
      </div>
      <div class="pair-vs">×</div>
      <div class="pair-sign-box" id="pairBoxB" onclick="openSignPicker('B')">
        <div class="pair-sign-icon">❓</div>
        <div class="pair-sign-name">选择星座</div>
        <div class="pair-sign-hint">点击选择</div>
      </div>
    </div>
    <button class="pair-btn" id="pairBtn" disabled onclick="doPair()">查看配对结果</button>
    <div class="sign-grid hidden" id="signPicker"></div>
  </div>

  <div id="detailPanel"></div>

  <footer>
    仅供娱乐参考 · 愿你每一天都闪闪发光
  </footer>
</div>

// ---- 工具函数 ----
function seedRandom(seed) {
  let h = 0;
  for (let i = 0; i < seed.length; i++) {
    h = ((h << 5) - h) + seed.charCodeAt(i);
    h |= 0;
  }
  return function() {
    h = (h * 1103515245 + 12345) | 0;
    return (h >>> 0) / 0xFFFFFFFF;
  };
}

function getDaySeed() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
}

function pick(arr, rng) {
  return arr[Math.floor(rng() * arr.length)];
}

function getStars(score) {
  const full = Math.round(score / 20);
  return '★'.repeat(full) + '☆'.repeat(5 - full);
}

// ---- 运势模式 ----
function generateFortune(sign) {
  const seed = getDaySeed() + sign.name;
  const rng = seedRandom(seed);

  const categories = ASPECTS.map(aspect => {
    const score = 55 + Math.floor(rng() * 45);
    return { ...aspect, score, stars: getStars(score), desc: pick(aspect.descs, rng) };
  });

  const overall = Math.round(categories.reduce((s, c) => s + c.score, 0) / categories.length);

  return {
    overall, categories,
    luckyColor: pick(LUCKY_COLORS, rng),
    luckyNumber: Math.floor(rng() * 60) + 1,
    luckyDirection: pick(LUCKY_DIRECTIONS, rng),
    advice: pick(ADVICE_TEMPLATES, rng),
    sign,
  };
}

// ---- 配对模式 ----
let pairSlotA = null;
let pairSlotB = null;
let pickingFor = null;

function getPairScore(a, b) {
  const rng = seedRandom(getDaySeed() + a.name + b.name);
  const compatList = COMPAT_MAP[a.name];
  const isCompat = compatList && compatList.includes(b.name);
  const sameElement = a.element === b.element;

  // 元素相生相克
  const elementCompat = {
    '火风': true, '风火': true, '水土': true, '土水': true,
    '火土': false, '土火': false, '风水': false, '水风': false,
  };
  const elemKey = a.element + b.element;
  const elemOk = a.element === b.element ? true : (elementCompat[elemKey] ?? null);

  let base;
  if (isCompat && sameElement) base = 78;
  else if (isCompat) base = 72;
  else if (sameElement) base = 65;
  else if (elemOk === true) base = 60;
  else if (elemOk === null) base = 50;
  else base = 40;

  return {
    overall: base + Math.floor(rng() * 18),
    love: { score: base + Math.floor(rng() * 20), key: 'love', name: '爱情', icon: '💕' },
    friend: { score: base + Math.floor(rng() * 20) + 5, key: 'friend', name: '友情', icon: '🤝' },
    work: { score: base + Math.floor(rng() * 20) - 2, key: 'work', name: '事业合作', icon: '🤝' },
    rng,
  };
}

function getLevel(score) {
  if (score >= 85) return 'high';
  if (score >= 65) return 'mid';
  return 'low';
}

function openSignPicker(slot) {
  if (pickingFor === slot) {
    document.getElementById('signPicker').classList.add('hidden');
    pickingFor = null;
    return;
  }
  pickingFor = slot;
  const picker = document.getElementById('signPicker');
  picker.classList.remove('hidden');
  picker.innerHTML = SIGNS.map((s, i) => `
    <div class="sign-card" onclick="selectPairSign(${i})">
      <div class="sign-icon">${s.icon}</div>
      <div class="sign-name">${s.name}</div>
      <div class="sign-date-range">${s.dateRange}</div>
    </div>
  `).join('');
  picker.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function selectPairSign(index) {
  const sign = SIGNS[index];
  if (pickingFor === 'A') {
    pairSlotA = sign;
    updatePairBox('pairBoxA', sign);
  } else {
    pairSlotB = sign;
    updatePairBox('pairBoxB', sign);
  }
  document.getElementById('signPicker').classList.add('hidden');
  pickingFor = null;
  updatePairBtn();
}

function updatePairBox(id, sign) {
  const box = document.getElementById(id);
  box.classList.add('filled');
  box.innerHTML = `

    <div class="pair-sign-name">${sign.name}</div>
    <div class="pair-sign-hint">${sign.dateRange} · ${sign.element}象</div>
  `;
}

function updatePairBtn() {
  const btn = document.getElementById('pairBtn');
  btn.disabled = !(pairSlotA && pairSlotB);
}

function doPair() {
  if (!pairSlotA || !pairSlotB) return;
  const a = pairSlotA, b = pairSlotB;
  const data = getPairScore(a, b);
  const cats = [data.love, data.friend, data.work];
  const overall = Math.round(cats.reduce((s, c) => s + c.score, 0) / cats.length);
  const level = getLevel(overall);

          </div>
          <div class="score-label">配对指数</div>
        </div>
      </div>

      <div class="fortune-categories">
        ${cats.map(c => `
          <div class="fortune-cat">
            <div class="cat-icon">${c.icon}</div>
            <div class="cat-name">${c.name}契合度</div>
            <div class="cat-stars">${getStars(c.score)}</div>
            <div class="cat-desc">${pick(PAIR_CAT_DESCS[c.key][getLevel(c.score)], data.rng)}</div>
          </div>
        `).join('')}
      </div>

      <div class="pair-advice">
        💫 ${pick(PAIR_ADVICE[level], data.rng)}
      </div>
    </div>
  `;

  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ---- 模式切换 ----
let currentMode = 'fortune';

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
  document.getElementById('fortuneMode').classList.toggle('hidden', mode !== 'fortune');
  document.getElementById('pairMode').classList.toggle('hidden', mode !== 'pair');
  document.getElementById('detailPanel').innerHTML = '';

  if (mode === 'pair') {
    document.getElementById('signPicker').classList.add('hidden');
    pickingFor = null;
    pairSlotA = null;
    pairSlotB = null;
    resetPairBoxes();
    updatePairBtn();
  } else {
    // 清除运势模式下的选中态
    document.querySelectorAll('.sign-card').forEach(c => c.classList.remove('selected'));
  }
}

function resetPairBoxes() {
  ['pairBoxA', 'pairBoxB'].forEach(id => {
    const box = document.getElementById(id);
    box.classList.remove('filled');
    box.innerHTML = `
      <div class="pair-sign-icon">❓</div>
      <div class="pair-sign-name">选择星座</div>
      <div class="pair-sign-hint">点击选择</div>

  });
}

function setDateDisplay() {

}

function createStars() {
  const container = document.getElementById('stars');
  let html = '';
  for (let i = 0; i < 120; i++) {
    const x = Math.random() * 100, y = Math.random() * 100;
    const size = Math.random() * 2.5 + 0.5;
    const dur = Math.random() * 4 + 3, delay = Math.random() * 6;
    html += `<div class="star" style="left:${x}%;top:${y}%;width:${size}px;height:${size}px;--dur:${dur}s;--delay:${delay}s"></div>`;
  }
  container.innerHTML = html;
}
